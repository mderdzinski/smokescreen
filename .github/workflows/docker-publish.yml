name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: Release tag to build and publish.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPO_NAME }}/${{ vars.ARTIFACT_IMAGE_NAME }}

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release-tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "${tag}" =~ ^v.+ ]]; then
            echo "Release tag must start with v: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-tag.outputs.tag }}

      - name: Validate image repository variables
        shell: bash
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          ARTIFACT_REPO_NAME: ${{ vars.ARTIFACT_REPO_NAME }}
          ARTIFACT_IMAGE_NAME: ${{ vars.ARTIFACT_IMAGE_NAME }}
          WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT }}
        run: |
          required_vars=(
            GCP_PROJECT_ID
            ARTIFACT_REPO_NAME
            ARTIFACT_IMAGE_NAME
            WIF_PROVIDER
            WIF_SERVICE_ACCOUNT
          )
          missing=()

          for name in "${required_vars[@]}"; do
            value="${!name:-}"
            if [[ -z "${value//[[:space:]]/}" ]]; then
              missing+=("${name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            missing_csv="${missing[*]}"
            missing_csv="${missing_csv// /, }"
            echo "::error title=Missing image variables::Required GitHub Actions repository variables are missing or empty: ${missing_csv}" >&2
            echo "Set them in Settings > Secrets and variables > Actions > Variables, then rerun the workflow." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.release-tag.outputs.tag }}
            ${{ env.IMAGE }}:latest
