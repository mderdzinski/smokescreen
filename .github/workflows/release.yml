name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install semantic-release
        run: >
          npm install --no-save --no-package-lock
          semantic-release@^24
          @semantic-release/changelog@^6
          @semantic-release/commit-analyzer@^13
          @semantic-release/exec@^6
          @semantic-release/git@^10
          @semantic-release/release-notes-generator@^14

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Resolve released tag
        id: release-tag
        shell: bash
        run: |
          git fetch --tags --force origin
          tag="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n 1)"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          if [[ -n "${tag}" ]]; then
            echo "Resolved release tag ${tag}"
          else
            echo "No semantic-release tag was created for this push."
          fi

  publish-release-image:
    name: Publish release Docker image
    needs: release
    if: needs.release.outputs.tag != ''
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit

  deploy:
    name: Deploy to Cloud Run via Terraform
    needs: [release, publish-release-image]
    if: needs.release.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TF_INPUT: "0"
      TF_IN_AUTOMATION: "1"
      IMAGE_REPO: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPO_NAME }}/${{ vars.ARTIFACT_IMAGE_NAME }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Validate deploy repository variables
        shell: bash
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          ARTIFACT_REPO_NAME: ${{ vars.ARTIFACT_REPO_NAME }}
          ARTIFACT_IMAGE_NAME: ${{ vars.ARTIFACT_IMAGE_NAME }}
          TFSTATE_BUCKET: ${{ vars.TFSTATE_BUCKET }}
          DASHBOARD_ALLOWED_USER: ${{ vars.DASHBOARD_ALLOWED_USER }}
          SMOKESCREEN_SENDER_EMAIL: ${{ vars.SMOKESCREEN_SENDER_EMAIL }}
          SMOKESCREEN_SENDER_NAME: ${{ vars.SMOKESCREEN_SENDER_NAME }}
          WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT }}
        run: |
          required_vars=(
            GCP_PROJECT_ID
            GCP_REGION
            ARTIFACT_REPO_NAME
            ARTIFACT_IMAGE_NAME
            TFSTATE_BUCKET
            DASHBOARD_ALLOWED_USER
            SMOKESCREEN_SENDER_EMAIL
            SMOKESCREEN_SENDER_NAME
            WIF_PROVIDER
            WIF_SERVICE_ACCOUNT
          )
          missing=()

          for name in "${required_vars[@]}"; do
            value="${!name:-}"
            if [[ -z "${value//[[:space:]]/}" ]]; then
              missing+=("${name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            missing_csv="${missing[*]}"
            missing_csv="${missing_csv// /, }"
            echo "::error title=Missing deploy variables::Required GitHub Actions repository variables are missing or empty: ${missing_csv}" >&2
            echo "Set them in Settings > Secrets and variables > Actions > Variables, then rerun the Release workflow." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}"

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_sender_email: ${{ vars.SMOKESCREEN_SENDER_EMAIL }}
          TF_VAR_sender_name: ${{ vars.SMOKESCREEN_SENDER_NAME }}
          TF_VAR_dashboard_allowed_user: ${{ vars.DASHBOARD_ALLOWED_USER }}
          TF_VAR_image: ${{ env.IMAGE_REPO }}:${{ needs.release.outputs.tag }}
        run: terraform apply -auto-approve -input=false
